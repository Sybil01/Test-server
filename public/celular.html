<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>CELUIDO — Controlador</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --c-bg: #000;
      --c-accent: #00ff88;
      --c-dim: rgba(0,255,136,0.18);
      --c-text: #e0ffe8;
      --transition: 0.06s linear;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      touch-action: none;
      font-family: 'Share Tech Mono', monospace;
    }

    body {
      background: var(--c-bg);
      color: var(--c-text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: background var(--transition);
    }

    /* Pantalla de inicio */
    #pantalla-inicio {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      padding: 2rem;
      text-align: center;
    }

    .titulo-inicio {
      font-size: 2.2rem;
      letter-spacing: 0.3em;
      color: var(--c-accent);
      text-shadow: 0 0 20px var(--c-accent);
    }

    .subtitulo {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      opacity: 0.5;
      text-transform: uppercase;
    }

    #btn-activar {
      padding: 1rem 2rem;
      background: transparent;
      border: 1px solid var(--c-accent);
      color: var(--c-accent);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.85rem;
      letter-spacing: 0.2em;
      cursor: pointer;
      text-transform: uppercase;
      transition: background 0.2s, box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    #btn-activar:active {
      background: var(--c-dim);
      box-shadow: 0 0 20px var(--c-accent);
    }

    /* Pantalla activa */
    #pantalla-activa {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      height: 100%;
      padding: 2rem 1.5rem;
    }

    #pantalla-activa.visible { display: flex; }

    /* ID asignado */
    #voz-id {
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      opacity: 0.45;
      text-transform: uppercase;
    }

    /* Visualizador central */
    #viz {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    #viz-canvas {
      width: 220px;
      height: 220px;
    }

    /* Métricas */
    #metricas {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1rem;
      width: 100%;
      max-width: 340px;
    }

    .metrica {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
    }

    .metrica-label {
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      opacity: 0.4;
      text-transform: uppercase;
    }

    .metrica-valor {
      font-size: 1.1rem;
      color: var(--c-accent);
      text-shadow: 0 0 8px var(--c-accent);
      transition: color 0.1s;
    }

    /* Estado conexión */
    #estado-ws {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      opacity: 0.4;
      text-transform: uppercase;
    }

    #estado-ws.conectado { color: var(--c-accent); opacity: 0.7; }
    #estado-ws.desconectado { color: #ff4444; opacity: 0.7; }

    /* Flash overlay */
    #flash-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.06s linear;
      z-index: 999;
    }
  </style>
</head>
<body>

<div id="pantalla-inicio">
  <div>
    <div class="titulo-inicio">CELUIDO</div>
    <div class="subtitulo">controlador gestual</div>
  </div>
  <button id="btn-activar">Activar controlador</button>
</div>

<div id="pantalla-activa">
  <div id="voz-id">sin asignar</div>
  <div id="viz">
    <canvas id="viz-canvas" width="220" height="220"></canvas>
  </div>
  <div id="metricas">
    <div class="metrica">
      <span class="metrica-label">ratio</span>
      <span class="metrica-valor" id="m-ratio">1.0</span>
    </div>
    <div class="metrica">
      <span class="metrica-label">mod.idx</span>
      <span class="metrica-valor" id="m-mod">0.0</span>
    </div>
    <div class="metrica">
      <span class="metrica-label">amp</span>
      <span class="metrica-valor" id="m-amp">0.0</span>
    </div>
  </div>
  <div id="estado-ws">conectando…</div>
</div>

<div id="flash-overlay"></div>

<script>
  // ── Configuración ──────────────────────────────────────────────
  // Cambiar por la IP/dominio del servidor en producción
  const WS_URL = (() => {
  const proto = location.protocol === "https:" ? "wss:" : "ws:";
  const host = location.hostname === "localhost"
    ? "localhost:3000"
    : "tu-servidor.railway.app"; // ← reemplazar con la URL de Railway
  return `${proto}//${host}`;
})();
  const SEND_RATE = 30; // Hz — envío de datos al servidor

  // ── Estado ────────────────────────────────────────────────────
  let ws = null;
  let myId = null;
  let beta = 0, gamma = 0;
  let accelMag = 0;
  let ratio = 1, modIndex = 0, amp = 0;
  let animFrame = null;
  let lastSend = 0;

  // ── Utilidades ────────────────────────────────────────────────
  function mapRange(v, inMin, inMax, outMin, outMax) {
    return outMin + ((v - inMin) * (outMax - outMin)) / (inMax - inMin);
  }

  function clamp(v, min, max) {
    return Math.max(min, Math.min(max, v));
  }

  // ── WebSocket ─────────────────────────────────────────────────
  function conectarWS() {
    ws = new WebSocket(WS_URL);

    ws.onopen = () => {
      ws.send(JSON.stringify({ type: "register", role: "controlador" }));
      document.getElementById("estado-ws").textContent = "conectado";
      document.getElementById("estado-ws").className = "conectado";
    };

    ws.onmessage = (evt) => {
      const msg = JSON.parse(evt.data);
      if (msg.type === "assigned") {
        myId = msg.id;
        document.getElementById("voz-id").textContent = msg.id;
      }
    };

    ws.onclose = () => {
      document.getElementById("estado-ws").textContent = "desconectado — reintentando…";
      document.getElementById("estado-ws").className = "desconectado";
      setTimeout(conectarWS, 2000);
    };

    ws.onerror = () => ws.close();
  }

  function enviarControl() {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(JSON.stringify({
      type: "control",
      ratio, modIndex, amp, beta, gamma
    }));
  }

  // ── Sensores ──────────────────────────────────────────────────
  function iniciarSensores() {
    window.addEventListener("deviceorientation", (e) => {
      beta = e.beta || 0;   // -180 a 180 (inclinación frontal)
      gamma = e.gamma || 0; // -90 a 90 (inclinación lateral)

      // gamma → ratio portadora/moduladora (1:1 a 1:8, valores enteros = armónicos)
      const gammaRaw = mapRange(clamp(gamma, -90, 90), -90, 90, 1, 8);
      ratio = Math.round(gammaRaw * 2) / 2; // cuantiza a 0.5 → semi-armónicos

      updateColor();
    });

    window.addEventListener("devicemotion", (e) => {
      const a = e.accelerationIncludingGravity;
      if (!a) return;
      accelMag = Math.sqrt((a.x||0)**2 + (a.y||0)**2 + (a.z||0)**2);

      // Índice de modulación: desviación respecto a la gravedad (movimiento activo)
      const devGrav = Math.abs(accelMag - 9.81);
      modIndex = clamp(mapRange(devGrav, 0, 15, 0, 10), 0, 10);

      // Amplitud: magnitud total normalizada
      amp = clamp(mapRange(accelMag, 0, 25, 0, 1), 0, 1);

      // Flash visual en movimientos bruscos
      if (devGrav > 8) flashEffect(devGrav);
    });
  }

  // ── Visualización ─────────────────────────────────────────────
  const canvas = document.getElementById("viz-canvas");
  const ctx = canvas.getContext("2d");
  const CX = 110, CY = 110;

  function updateColor() {
    // beta → tinte de fondo (azul profundo ↔ cian ↔ verde)
    const t = clamp(mapRange(beta, -90, 90, 0, 1), 0, 1);
    let r, g, b;
    if (t < 0.5) {
      const k = t / 0.5;
      r = Math.round(0);
      g = Math.round(180 * k);
      b = Math.round(180 + 75 * k);
    } else {
      const k = (t - 0.5) / 0.5;
      r = Math.round(0 + 20 * k);
      g = Math.round(180 + 75 * k);
      b = Math.round(255 - 80 * k);
    }
    document.body.style.background = `radial-gradient(circle at center, rgb(${r},${g},${b}) 0%, #000 70%)`;

    const flashEl = document.getElementById("flash-overlay");
    flashEl.style.background = `rgb(${r},${g},${b})`;
  }

  function flashEffect(intensity) {
    const flashEl = document.getElementById("flash-overlay");
    const peak = clamp(mapRange(intensity, 8, 20, 0.05, 0.35), 0, 0.35);
    flashEl.style.opacity = peak;
    setTimeout(() => { flashEl.style.opacity = 0; }, 80);
  }

  function drawViz() {
    animFrame = requestAnimationFrame(drawViz);

    ctx.clearRect(0, 0, 220, 220);

    const now = performance.now();

    // Anillo exterior — ratio → segmentos
    const segs = Math.round(ratio * 2);
    for (let i = 0; i < segs; i++) {
      const angle = (i / segs) * Math.PI * 2 - Math.PI / 2;
      const nextAngle = ((i + 1) / segs) * Math.PI * 2 - Math.PI / 2;
      const alpha = 0.15 + amp * 0.5;
      ctx.beginPath();
      ctx.arc(CX, CY, 95, angle, nextAngle);
      ctx.strokeStyle = `rgba(0,255,136,${alpha})`;
      ctx.lineWidth = 3 + modIndex * 0.8;
      ctx.stroke();
    }

    // Círculo medio — modIndex → radio pulsante
    const pulseR = 40 + modIndex * 4 + Math.sin(now * 0.004) * (5 + modIndex * 2);
    const gradient = ctx.createRadialGradient(CX, CY, 0, CX, CY, pulseR);
    gradient.addColorStop(0, `rgba(0,255,136,${0.1 + amp * 0.4})`);
    gradient.addColorStop(1, "rgba(0,255,136,0)");
    ctx.beginPath();
    ctx.arc(CX, CY, pulseR, 0, Math.PI * 2);
    ctx.fillStyle = gradient;
    ctx.fill();

    // Cruz central — orientación del dispositivo
    const crossX = CX + mapRange(gamma, -90, 90, -25, 25);
    const crossY = CY + mapRange(beta, -90, 90, -25, 25);
    ctx.beginPath();
    ctx.arc(crossX, crossY, 5 + amp * 8, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(0,255,136,${0.6 + amp * 0.4})`;
    ctx.fill();

    // Actualizar métricas
    document.getElementById("m-ratio").textContent = ratio.toFixed(1);
    document.getElementById("m-mod").textContent = modIndex.toFixed(1);
    document.getElementById("m-amp").textContent = amp.toFixed(2);

    // Envío al servidor a SEND_RATE Hz
    if (now - lastSend > 1000 / SEND_RATE) {
      enviarControl();
      lastSend = now;
    }
  }

  // ── Activación ────────────────────────────────────────────────
  document.getElementById("btn-activar").addEventListener("click", () => {
    const activar = () => {
      document.getElementById("pantalla-inicio").style.display = "none";
      document.getElementById("pantalla-activa").classList.add("visible");

      // Fullscreen en móvil
      if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen().catch(() => {});
      }

      conectarWS();
      iniciarSensores();
      drawViz();
    };

    // iOS requiere solicitud explícita de permisos para sensores
    if (typeof DeviceMotionEvent !== "undefined" &&
        typeof DeviceMotionEvent.requestPermission === "function") {
      DeviceMotionEvent.requestPermission().then(state => {
        if (state === "granted") {
          DeviceOrientationEvent.requestPermission().then(s => {
            if (s === "granted") activar();
          });
        }
      }).catch(() => activar());
    } else {
      activar();
    }
  });
</script>
</body>
</html>
